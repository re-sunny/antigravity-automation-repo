<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Trends - 개인 테크 뉴스 리더 & 인사이트</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Chart.js CDN for interactive charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- 헤더 내비게이션 바 -->
    <header>
        <div class="header-container">
            <div style="display: flex; flex-direction: column;">
                <div class="logo">
                    <div class="logo-icon">⚡</div>
                    <span>TECH TRENDS</span>
                </div>
                <div class="logo-sub">나만의 개별 IT/테크 뉴스 포털 & 인사이트 보드</div>
            </div>

            <!-- 탭 메뉴 내비게이션 -->
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="feed-tab">📰 뉴스 피드</button>
                <button class="nav-tab" data-tab="bookmarks-tab">⭐ 즐겨찾기</button>
                <button class="nav-tab" data-tab="insights-tab">📊 인사이트 분석</button>
            </nav>
        </div>
    </header>

    <!-- 메인 작업 공간 영역 -->
    <main>

        <!-- 탭 1: 뉴스 피드 목록 -->
        <section id="feed-tab" class="tab-content active">
            <!-- 검색 및 필터 컨트롤 -->
            <div class="controls-bar">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" class="search-input" placeholder="키워드로 가상/실제 기사 검색...">
                </div>
                <div class="filter-group">
                    <select id="source-filter" class="filter-select">
                        <option value="all">모든 뉴스 출처</option>
                        <option value="GeekNews">GeekNews</option>
                        <option value="TechCrunch">TechCrunch</option>
                    </select>
                    <input type="date" id="date-filter" class="filter-select" title="수집/발행 날짜별로 필터링">
                    <span class="results-count" id="results-count">조회 결과: 0개 기사</span>
                </div>
            </div>

            <!-- 기사 카드 그리드 목록 -->
            <div id="loader" class="pulse-spinner" style="display: none;"></div>
            <div id="news-grid" class="news-grid">
                <!-- script를 통해 동적으로 로드됨 -->
            </div>
        </section>

        <!-- 탭 2: 북마크 목록 -->
        <section id="bookmarks-tab" class="tab-content">
            <div class="controls-bar">
                <h3 style="font-family: var(--font-title); font-weight: 600;">⭐ 내 보관함</h3>
                <span class="results-count" id="bookmarks-count">북마크: 0개</span>
            </div>

            <div id="bookmarks-grid" class="news-grid">
                <!-- 북마크된 카드가 동적으로 주입됨 -->
            </div>
        </section>

        <!-- 탭 3: 트렌드 인사이트 -->
        <section id="insights-tab" class="tab-content">
            <!-- 통계 요약 카드 그리드 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">전체 수집 뉴스</span>
                    <span class="stat-value" id="stat-total-news">0</span>
                </div>
                <div class="stat-card cyan">
                    <span class="stat-label">GeekNews 기사 수</span>
                    <span class="stat-value" id="stat-geek-news">0</span>
                </div>
                <div class="stat-card emerald">
                    <span class="stat-label">TechCrunch 기사 수</span>
                    <span class="stat-value" id="stat-tc-news">0</span>
                </div>
                <div class="stat-card orange">
                    <span class="stat-label">내 소중한 북마크</span>
                    <span class="stat-value" id="stat-bookmarks">0</span>
                </div>
            </div>

            <!-- 시각화 차트 그리드 -->
            <div class="charts-grid">
                <!-- 차트 1: 요일/일자별 뉴스 수집 누적 빈도 흐름 -->
                <div class="chart-card">
                    <h3 class="chart-card-title">📈 최근 뉴스 정보 수집 빈도 추이</h3>
                    <div class="chart-container-elm">
                        <canvas id="frequencyChart"></canvas>
                    </div>
                </div>

                <!-- 차트 2: 뉴스 데이터 출처 비율 -->
                <div class="chart-card">
                    <h3 class="chart-card-title">🍩 수집 출처 분포 비율</h3>
                    <div class="chart-container-elm">
                        <canvas id="ratioChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 인사이트 3: 핫 테크 트렌드 키워드 집계 -->
            <div class="keywords-panel">
                <h3 class="chart-card-title">🔥 실시간 핫 테크 트렌드 키워드 (실수집 타이틀 기반형)</h3>
                <div id="keywords-container" class="keywords-container">
                    <!-- 스크립트로 상위 빈도 키워드 노출 예정 -->
                </div>
            </div>
        </section>

    </main>

    <!-- 기사 상세 모달 -->
    <div id="modal-details" class="modal-backdrop">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <span id="detail-source-badge" class="source-badge">출처</span>
                    <h3 class="modal-title" id="detail-title" style="margin-top: 0.5rem;">기사 제목</h3>
                </div>
                <button class="modal-close" id="btn-close-details">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-meta-row">
                    <span style="font-size: 0.8rem; color: var(--text-muted);">발행 시간: <span
                            id="detail-pub-date">-</span></span>
                    <button id="detail-bookmark-btn" class="btn-bookmark">★</button>
                </div>
                <p class="modal-desc" id="detail-desc">기사 본문 요약...</p>
                <div id="modal-summary-section"
                    style="display: none; margin-top: 1.5rem; padding: 1.25rem; border-radius: 12px; background: rgba(99, 99, 241, 0.08); border: 1px solid rgba(99, 99, 241, 0.25);">
                    <h4
                        style="margin-top: 0; margin-bottom: 0.75rem; color: #a5b4fc; font-size: 0.95rem; font-family: var(--font-title); display: flex; align-items: center; gap: 0.35rem;">
                        <span>⚡ AI 핵심 요약</span>
                    </h4>
                    <ul id="modal-summary-list"
                        style="margin: 0; padding-left: 1.2rem; font-size: 0.88rem; line-height: 1.6; color: var(--text-primary); display: flex; flex-direction: column; gap: 0.5rem;">
                        <!-- 요약 문장들이 여기에 주입됩니다 -->
                    </ul>
                </div>
            </div>
            <div class="modal-footer"
                style="display: flex; gap: 0.5rem; justify-content: flex-end; align-items: center;">
                <button class="btn-modal btn-modal-secondary" id="btn-modal-summary"
                    style="margin-right: auto; background: rgba(99, 99, 241, 0.2); border-color: rgba(99, 99, 241, 0.4); color: #a5b4fc; transition: all 0.3s ease;">⚡
                    AI 3줄 요약</button>
                <button class="btn-modal btn-modal-secondary" id="btn-modal-close">닫기</button>
                <a href="#" target="_blank" class="btn-modal btn-modal-primary" id="detail-link-btn">원문 보기 ↗</a>
            </div>
        </div>
    </div>

    <!-- 스크립트 로드 연계 -->
    <script src="/static/js/app.js"></script>
</body>

</html>
